<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Page not found — Straw Motion</title>
  <meta name="robots" content="noindex">
  <link href="https://framerusercontent.com/sites/icons/default-favicon-light.v1.png" rel="icon" media="(prefers-color-scheme: light)">
  <link href="https://framerusercontent.com/sites/icons/default-favicon-dark.v1.png" rel="icon" media="(prefers-color-scheme: dark)">
  <style data-framer-font-css="">
    @font-face { font-family: "Inter Display"; src: url("/assets/fonts/inter-display-600.woff2"); font-display: swap; font-style: normal; font-weight: 600; unicode-range: U+0000-00FF }
    @font-face { font-family: "Fragment Mono"; font-style: normal; font-weight: 400; src: url(/assets/fonts/fragment-mono-400.woff2) format('woff2'); unicode-range: U+0000-00FF }
  </style>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Inter Display", system-ui, sans-serif;
      background: #f5f5f5;
      color: rgb(38, 42, 54);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      text-align: center;
      -webkit-font-smoothing: antialiased;
    }
    .label {
      font-family: "Fragment Mono", monospace;
      font-size: 12px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: rgb(59, 69, 84);
      margin-bottom: 20px;
    }
    h1 {
      font-size: clamp(32px, 5vw, 52px);
      font-weight: 600;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
    }
    p {
      font-size: 18px;
      font-weight: 400;
      color: rgb(59, 69, 84);
      margin-bottom: 40px;
      max-width: 400px;
    }
    .links {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }
    a {
      display: inline-block;
      padding: 12px 24px;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: opacity .15s;
    }
    a:hover { opacity: .7; }
    .btn-primary { background: rgb(38, 42, 54); color: #fff; }
    .btn-secondary { background: #fff; color: rgb(38, 42, 54); border: 1px solid rgba(38,42,54,.15); }
  </style>
</head>
<body>
  <div class="label">404</div>
  <h1>Page not found</h1>
  <p>The page you're looking for doesn't exist or has been moved.</p>
  <div class="links">
    <a class="btn-primary" href="/">Go home</a>
    <a class="btn-secondary" href="/news">Browse news</a>
  </div>
</body>
</html>
