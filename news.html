    @font-face { font-family: "Inter Display"; src: url("/assets/fonts/inter-display-700.woff2"); font-display: swap; font-style: normal; font-weight: 700; unicode-range: U+0000-00FF }

  </style>
  <link rel="stylesheet" href="/css/article.css">
  <link rel="stylesheet" href="/css/news.css">
</head>
<body>

  <!-- Nav -->
  <div class="sm-nav-wrap">
    <div class="sm-nav">
      <a class="sm-nav-logo" href="/" aria-label="Straw Motion">
        <img src="/assets/icons/logo.svg" alt="Straw Motion" width="140" height="18">
      </a>
      <nav class="sm-nav-links">
        <a href="/about">About</a>
        <a href="/news" aria-current="page">News</a>
        <a href="/contact">Contact</a>
      </nav>
      <div class="sm-nav-hamburger" aria-label="Menu">
        <span></span><span></span>
      </div>
    </div>
  </div>

  <!-- Hero -->
  <section class="sm-hero">
    <div class="sm-hero-titles">
      <h1 class="sm-hero-title">News</h1>
      <p class="sm-hero-subtitle">Thinking from Straw Motion on synthetic media, design, and culture.</p>
    </div>
  </section>

  <!-- Article grid -->
  <div class="sm-content-outer">
    <div class="sm-content-inner">
      <div id="sm-cms-grid">
        <p class="sm-status">Loading articles…</p>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="sm-footer">
    <div class="sm-footer-inner">
      <div class="sm-footer-brand">Straw Motion</div>
      <div class="sm-footer-copy">Synthetic media lab for viral reach</div>
    </div>
  </footer>

  <script>
  (function () {
    var SUPABASE_URL = 'https://wutjrgehayeirovhmono.supabase.co';
    var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind1dGpyZ2VoYXllaXJvdmhtb25vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NjEwODgsImV4cCI6MjA5MDAzNzA4OH0.MuoqTQutCS6U6YOvmgCbAcMM01JikZTGX0u41O_5Xjc';

    var grid = document.getElementById('sm-cms-grid');

    function esc(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function formatDate(str) {
      if (!str) return '';
      var d = new Date(str);
      return isNaN(d) ? str : d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    function renderGrid(articles) {
      if (!articles.length) {
        grid.innerHTML = '<p class="sm-status">No articles yet.</p>';
        return;
      }

      grid.innerHTML = articles.map(function (a) {
        var imgHTML = a.cover_image
          ? '<div class="sm-post-img"><img src="' + esc(a.cover_image) + '" alt="' + esc(a.title) + '" loading="lazy"></div>'
          : '';

        return '<a class="sm-post-card" href="/news/article?slug=' + encodeURIComponent(a.slug) + '">' +
          imgHTML +
          '<div class="sm-post-body">' +
            (a.category ? '<div class="sm-post-cat">' + esc(a.category) + '</div>' : '') +
            '<h2 class="sm-post-title">' + esc(a.title) + '</h2>' +
            (a.excerpt ? '<p class="sm-post-excerpt">' + esc(a.excerpt) + '</p>' : '') +
            (a.date ? '<div class="sm-post-date">' + esc(formatDate(a.date)) + '</div>' : '') +
          '</div>' +
        '</a>';
      }).join('');
    }

    fetch(
      SUPABASE_URL + '/rest/v1/articles?select=slug,title,excerpt,category,cover_image,date&published=eq.true&order=date.desc',
      {
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
        }
      }
    )
      .then(function (r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(renderGrid)
      .catch(function () {
        grid.innerHTML = '<p class="sm-status">Could not load articles. Please try again later.</p>';
      });
  })();
  </script>

</body>
</html>
