  <script>
  (function () {
    var SUPABASE_URL = 'https://wutjrgehayeirovhmono.supabase.co';
    var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind1dGpyZ2VoYXllaXJvdmhtb25vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NjEwODgsImV4cCI6MjA5MDAzNzA4OH0.MuoqTQutCS6U6YOvmgCbAcMM01JikZTGX0u41O_5Xjc';

    var grid = document.getElementById('sm-cms-grid');

    function esc(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function formatDate(str) {
      if (!str) return '';
      var d = new Date(str);
      return isNaN(d) ? str : d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    function renderGrid(articles) {
      if (!articles.length) {
        grid.innerHTML = '<p class="sm-status">No articles yet.</p>';
        return;
      }

      grid.innerHTML = articles.map(function (a) {
        var readTime = a.body ? Math.max(1, Math.round(a.body.split(/\s+/).length / 200)) + ' min read' : '';
        var imgHTML = '<div class="sm-post-img">' +
          (a.cover_image ? '<img src="' + esc(a.cover_image) + '" alt="' + esc(a.title) + '" loading="lazy">' : '') +
          '</div>';

        return '<a class="sm-post-card" href="/news/article?slug=' + encodeURIComponent(a.slug) + '">' +
          imgHTML +
          '<div class="sm-post-body">' +
            (readTime ? '<div class="sm-post-read">' + esc(readTime) + '</div>' : '') +
            '<h2 class="sm-post-title">' + esc(a.title) + '</h2>' +
            '<div class="sm-post-indicator">' +
              '<span class="sm-post-indicator-dot"></span>' +
              '<span class="sm-post-indicator-line"></span>' +
            '</div>' +
          '</div>' +
        '</a>';
      }).join('');
    }

    fetch(
      SUPABASE_URL + '/rest/v1/articles?select=slug,title,cover_image,body&published=eq.true&order=date.desc',
      {
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
        }
      }
    )
      .then(function (r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(renderGrid)
      .catch(function () {
        grid.innerHTML = '<p class="sm-status">Could not load articles. Please try again later.</p>';
      });
  })();
  </script>
