  <script>
  (function () {
    var SUPABASE_URL = 'https://wutjrgehayeirovhmono.supabase.co';
    var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind1dGpyZ2VoYXllaXJvdmhtb25vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NjEwODgsImV4cCI6MjA5MDAzNzA4OH0.MuoqTQutCS6U6YOvmgCbAcMM01JikZTGX0u41O_5Xjc';

    function esc(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function plainToHtml(text) {
      // Always treat body as plain text — escape then wrap in paragraphs
      return text.split(/\n\n+/).map(function (para) {
        return '<p>' + esc(para).replace(/\n/g, '<br>') + '</p>';
      }).join('');
    }

    function setMeta(sel, val) {
      var el = document.querySelector(sel);
      if (el) el.setAttribute('content', val);
    }

    function formatDate(str) {
      if (!str) return '';
      var d = new Date(str);
      return isNaN(d) ? str : d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    function readTime(body) {
      if (!body) return '';
      var words = body.trim().split(/\s+/).length;
      return Math.max(1, Math.round(words / 200)) + ' min read';
    }

    function render(post) {
      var canonical = 'https://strawmotion.com/news/article?slug=' + encodeURIComponent(post.slug);
      var pageUrl = encodeURIComponent(canonical);
      var pageTitle = encodeURIComponent(post.title);

      // Head meta
      document.title = post.title + ' \u2014 Straw Motion';
      setMeta('meta[name="description"]', post.excerpt || '');
      setMeta('meta[property="og:title"]', post.title);
      setMeta('meta[property="og:description"]', post.excerpt || '');
      setMeta('meta[property="og:image"]', post.cover_image || '');
      setMeta('meta[name="twitter:title"]', post.title);
      setMeta('meta[name="twitter:description"]', post.excerpt || '');
      setMeta('meta[name="twitter:image"]', post.cover_image || '');
      var canonEl = document.querySelector('link[rel="canonical"]');
      if (canonEl) canonEl.href = canonical;

      // JSON-LD
      var ld = {
        '@context': 'https://schema.org',
        '@type': 'NewsArticle',
        headline: post.title,
        description: post.excerpt || '',
        url: canonical,
        image: post.cover_image || '',
        datePublished: post.date || '',
        publisher: { '@type': 'Organization', name: 'Straw Motion', url: 'https://strawmotion.com' }
      };
      if (post.author) { ld.author = { '@type': 'Person', name: post.author }; }
      var ldEl = document.createElement('script');
      ldEl.type = 'application/ld+json';
      ldEl.textContent = JSON.stringify(ld);
      document.head.appendChild(ldEl);

      var date = formatDate(post.date);
      var rt = post.read_time ? post.read_time + ' min read' : readTime(post.body);

      var authorAvatarHTML = post.author_image
        ? '<img class="sm-author-avatar" src="' + esc(post.author_image) + '" alt="' + esc(post.author || '') + '">'
        : '<div class="sm-author-avatar-placeholder"></div>';

      var heroImageHTML = post.cover_image
        ? '<div class="sm-hero-image-wrap"><img src="' + esc(post.cover_image) + '" alt="' + esc(post.title) + '"></div>'
        : '';

      // Social share URLs
      var twitterShare = 'https://twitter.com/intent/tweet?url=' + pageUrl + '&text=' + pageTitle;
      var linkedinShare = 'https://www.linkedin.com/sharing/share-offsite/?url=' + pageUrl;

      document.getElementById('sm-page').innerHTML =
        // ── Hero header ──
        '<section class="sm-hero">' +
          '<div class="sm-hero-pill">' +
            '<span class="sm-pill-dot"></span>' +
            esc(rt || post.category || 'Article') +
          '</div>' +
          '<div class="sm-hero-titles">' +
            '<h1 class="sm-hero-title">' + esc(post.title) + '</h1>' +
            (post.excerpt ? '<p class="sm-hero-subtitle">' + esc(post.excerpt) + '</p>' : '') +
          '</div>' +
        '</section>' +

        // ── Hero image ──
        heroImageHTML +

        // ── Content ──
        '<div class="sm-content-outer">' +
          '<div class="sm-content-inner">' +

            // Author row with social share
            '<div class="sm-author-row">' +
              authorAvatarHTML +
              '<div class="sm-author-meta">' +
                (post.author ? '<div class="sm-author-name">' + esc(post.author) + '</div>' : '') +
                (post.author_role ? '<div class="sm-author-date">' + esc(post.author_role) + '</div>' : (date ? '<div class="sm-author-date">' + esc(date) + '</div>' : '')) +
              '</div>' +
              '<div class="sm-share-buttons">' +
                '<a class="sm-share-btn" href="' + twitterShare + '" target="_blank" rel="noopener" aria-label="Share on X">' +
                  '<svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M12.6.75h2.454l-5.36 6.142L16 15.25h-4.937l-3.867-5.07-4.425 5.07H.316l5.733-6.57L0 .75h5.063l3.495 4.633L12.601.75Zm-.86 13.028h1.36L4.323 2.145H2.865z"/></svg>' +
                  '<span>X</span>' +
                '</a>' +
                '<a class="sm-share-btn" href="' + linkedinShare + '" target="_blank" rel="noopener" aria-label="Share on LinkedIn">' +
                  '<svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M0 1.146C0 .513.526 0 1.175 0h13.65C15.474 0 16 .513 16 1.146v13.708c0 .633-.526 1.146-1.175 1.146H1.175C.526 16 0 15.487 0 14.854V1.146zm4.943 12.248V6.169H2.542v7.225h2.401zm-1.2-8.212c.837 0 1.358-.554 1.358-1.248-.015-.709-.52-1.248-1.342-1.248-.822 0-1.359.54-1.359 1.248 0 .694.521 1.248 1.327 1.248h.016zm4.908 8.212V9.359c0-.216.016-.432.08-.586.173-.431.568-.878 1.232-.878.869 0 1.216.662 1.216 1.634v3.865h2.401V9.25c0-2.22-1.184-3.252-2.764-3.252-1.274 0-1.845.7-2.165 1.193v.025h-.016a5.54 5.54 0 0 1 .016-.025V6.169h-2.4c.03.678 0 7.225 0 7.225h2.4z"/></svg>' +
                  '<span>LinkedIn</span>' +
                '</a>' +
              '</div>' +
            '</div>' +

            // Body
            '<div class="sm-article-body">' + plainToHtml(post.body || '') + '</div>' +

            // Post-body divider + date
            '<hr class="sm-article-divider">' +
            (date ? '<div class="sm-article-date">' + esc(date) + '</div>' : '') +

          '</div>' +
        '</div>' +

        // ── Author bio card ──
        (post.author ? (
          '<div class="sm-content-outer">' +
            '<div class="sm-content-inner sm-content-inner--no-top-pad">' +
              '<div class="sm-author-bio-card">' +
                authorAvatarHTML.replace('sm-author-avatar', 'sm-author-bio-avatar').replace('sm-author-avatar-placeholder', 'sm-author-bio-avatar') +
                '<div class="sm-author-bio-body">' +
                  '<div class="sm-author-bio-name">' + esc(post.author) + '</div>' +
                  (post.author_role ? '<div class="sm-author-bio-role">' + esc(post.author_role) + '</div>' : '') +
                  (post.author_bio ? '<p class="sm-author-bio-text">' + esc(post.author_bio) + '</p>' : '') +
                '</div>' +
              '</div>' +
            '</div>' +
          '</div>'
        ) : '') +

        // ── CTA section ──
        '<div class="sm-cta-section">' +
          '<div class="sm-cta-inner">' +
            '<div class="sm-hero-pill">' +
              '<span class="sm-pill-dot"></span>' +
              'Free 20-min intro call' +
            '</div>' +
            '<h2 class="sm-cta-title">Tell us what you\'re building</h2>' +
            '<p class="sm-cta-subtitle">Share your vision and we\'ll show you what\'s possible.</p>' +
            '<a class="sm-cta-btn" href="/contact">Book a call</a>' +
          '</div>' +
        '</div>';

      // Load suggested articles
      loadSuggested(post.slug);
    }

    function loadSuggested(currentSlug) {
      fetch(
        SUPABASE_URL + '/rest/v1/articles?select=slug,title,cover_image,body&published=eq.true&order=date.desc&limit=4',
        { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY } }
      )
      .then(function(r) { return r.json(); })
      .then(function(articles) {
        var others = articles.filter(function(a) { return a.slug !== currentSlug; }).slice(0, 3);
        if (!others.length) return;

        var cardsHTML = others.map(function(a) {
          var rt = readTime(a.body);
          var imgHTML = '<div class="sm-post-img">' +
            (a.cover_image ? '<img src="' + esc(a.cover_image) + '" alt="' + esc(a.title) + '" loading="lazy">' : '') +
            '</div>';
          return '<a class="sm-post-card" href="/news/article?slug=' + encodeURIComponent(a.slug) + '">' +
            imgHTML +
            '<div class="sm-post-body">' +
              (rt ? '<div class="sm-post-read">' + esc(rt) + '</div>' : '') +
              '<h3 class="sm-post-title">' + esc(a.title) + '</h3>' +
              '<div class="sm-post-indicator">' +
                '<span class="sm-post-indicator-dot"></span>' +
                '<span class="sm-post-indicator-line"></span>' +
              '</div>' +
            '</div>' +
          '</a>';
        }).join('');

        var section = document.createElement('div');
        section.className = 'sm-suggested-section';
        section.innerHTML =
          '<div class="sm-content-outer">' +
            '<div class="sm-suggested-header">' +
              '<div class="sm-suggested-header-left">' +
                '<div class="sm-hero-pill"><span class="sm-pill-dot"></span>Continue Reading</div>' +
                '<h2 class="sm-suggested-title">Keep exploring</h2>' +
              '</div>' +
              '<a class="sm-suggested-all" href="/news">All journals &rarr;</a>' +
            '</div>' +
            '<div class="sm-suggested-grid">' + cardsHTML + '</div>' +
          '</div>';

        var footer = document.querySelector('.sm-footer');
        if (footer) { footer.parentNode.insertBefore(section, footer); }
      })
      .catch(function() {});
    }

    var params = new URLSearchParams(window.location.search);
    var slug = params.get('slug');
    var page = document.getElementById('sm-page');

    if (!slug) {
      page.innerHTML = '<p class="sm-error">No article specified. <a href="/news">Back to News</a></p>';
      return;
    }

    fetch(
      SUPABASE_URL + '/rest/v1/articles?slug=eq.' + encodeURIComponent(slug) + '&select=*&limit=1',
      {
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
        }
      }
    )
      .then(function (r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(function (rows) {
        if (rows && rows.length) { render(rows[0]); }
        else { page.innerHTML = '<p class="sm-error">Article not found. <a href="/news">Back to News</a></p>'; }
      })
      .catch(function () {
        page.innerHTML = '<p class="sm-error">Could not load article. <a href="/news">Back to News</a></p>';
      });
  })();
  </script>

</body>
